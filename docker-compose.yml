services:
  archiver:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: 1000
        GID: 1000
    container_name: archiver
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      #- ./data:/app/data
      - /mnt/Videos/uploads:/app/data
    environment:
      - TZ=UTC
    depends_on:
      - bgutil-provider
    networks:
      - thpsrun
      - archiver-net

  bgutil-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    container_name: bgutil-provider
    restart: unless-stopped
    init: true
    networks:
      - archiver-net

networks:
  thpsrun:
    external: true
    name: website_thpsrun
  archiver-net:
    driver: bridge