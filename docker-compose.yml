services:
  archiver:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: 1001
        GID: 1001
    container_name: archiver
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    environment:
      - TZ=UTC
    depends_on:
      - bgutil-provider
    networks:
      - archiver-net

  bgutil-provider:
    image: brainicism/bgutil-ytdlp-pot-provider:latest
    container_name: bgutil-provider
    restart: unless-stopped
    init: true
    networks:
      - archiver-net

networks:
  archiver-net:
    driver: bridge