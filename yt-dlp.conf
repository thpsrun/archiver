# Cookie authentication
--cookies /app/data/cookies.txt

# Use default clients (android_vr + web_safari). web_safari's high-res formats
# are unlocked by the PO token provider below.
--extractor-args "youtube:player_client=default"

# PO token provider - points at the bgutil HTTP sidecar (see docker-compose.yml).
# Required for YouTube high-res formats; without it those formats are dropped
# as missing_pot and downloads silently fall back to ~720p.
--extractor-args "youtubepot-bgutilhttp:base_url=http://bgutil-provider:4416"

# Format selection
--format "bestvideo+bestaudio/best"
--merge-output-format mp4
--remux-video mp4

# Retry settings, just in case YouTube is having a fit.
--retries 3
--fragment-retries 3

# Use ffmpeg for HLS streams and merging (merging is automatic with bestvideo+bestaudio)
--hls-prefer-ffmpeg

# No progress bar in logs (cleaner output)
--no-progress

# Quiet mode with only errors shown
--quiet
--no-warnings

# Forces single-video downloads
--no-playlist
