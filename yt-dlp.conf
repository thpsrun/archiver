# Cookie authentication
--cookies /app/data/cookies.txt

# Use default client, avoid deprecated android_sdkless
--extractor-args youtube:player_client=default,-android_sdkless

# Format selection
--format "bestvideo+bestaudio/best"
--merge-output-format mp4
--remux-video mp4

# Retry settings, just in case YouTube is having a fit.
--retries 3
--fragment-retries 3

# Use ffmpeg for HLS streams and merging (merging is automatic with bestvideo+bestaudio)
--hls-prefer-ffmpeg

# No progress bar in logs (cleaner output)
--no-progress

# Quiet mode with only errors shown
--quiet
--no-warnings

# Forces single-video downloads
--no-playlist
